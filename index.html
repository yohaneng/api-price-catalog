<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Price Catalog | Research Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-full mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2 tracking-tight">API Pricing Catalog</h1>
            <p class="text-slate-600 text-lg">A research audit of 400+ APIs for PhD Digital Transparency studies.</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Search Name</label>
                <input type="text" id="searchInput" placeholder="Search..." class="w-full p-2.5 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Domain</label>
                <select id="domainFilter" class="w-full p-2.5 border border-slate-200 rounded-xl bg-white outline-none"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Pricing Model</label>
                <select id="modelFilter" class="w-full p-2.5 border border-slate-200 rounded-xl bg-white outline-none"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Scope</label>
                <select id="scopeFilter" class="w-full p-2.5 border border-slate-200 rounded-xl bg-white outline-none"></select>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200" id="apiTable">
                    <thead class="bg-slate-50">
                        <tr>
                            <th onclick="sortTable('name')" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-blue-600">Name <i class="fas fa-sort ml-1"></i></th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase">Description</th>
                            <th onclick="sortTable('domain')" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-blue-600">Domain <i class="fas fa-sort ml-1"></i></th>
                            <th onclick="sortTable('pricing_model')" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-blue-600">Model <i class="fas fa-sort ml-1"></i></th>
                            <th onclick="sortTable('current_price')" class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-blue-600">Price <i class="fas fa-sort ml-1"></i></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let apiData = [];
        let sortDirection = 1;

        async function init() {
            try {
                let response = await fetch('./dataset_400.json', { cache: 'no-cache' });
                if (!response.ok) response = await fetch('./Dataset_400.json', { cache: 'no-cache' });
                
                apiData = await response.json();
                
                populateDropdown('domainFilter', 'domain');
                populateDropdown('modelFilter', 'pricing_model');
                populateDropdown('scopeFilter', 'scope');
                renderTable(apiData);
                
                ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => {
                    document.getElementById(id).addEventListener('input', applyFilters);
                });
            } catch (err) { console.error("Error:", err); }
        }

        function populateDropdown(id, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
            el.innerHTML = `<option value="">All ${key.replace('_',' ')}s</option>` + 
                vals.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = data.map(api => `
                <tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="px-6 py-5 whitespace-nowrap">
                        <a href="${api.pricing_url}" target="_blank" class="text-blue-600 font-bold hover:underline">${api.name}</a>
                    </td>
                    <td class="px-6 py-5 text-sm text-slate-500 max-w-md">
                        ${api.description || '<span class="text-slate-300 italic">No description provided</span>'}
                    </td>
                    <td class="px-6 py-5 text-sm text-slate-600">${api.domain || 'N/A'}</td>
                    <td class="px-6 py-5 text-sm font-medium text-slate-700">${api.pricing_model || 'N/A'}</td>
                    <td class="px-6 py-5">
                        <span class="${api.current_price ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'} px-3 py-1 rounded-full text-xs font-bold border border-current">
                            ${api.current_price || 'Updating...'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const d = document.getElementById('domainFilter').value;
            const m = document.getElementById('modelFilter').value;
            const sc = document.getElementById('scopeFilter').value;

            const filtered = apiData.filter(i => 
                (i.name.toLowerCase().includes(s)) &&
                (d === "" || i.domain === d) &&
                (m === "" || i.pricing_model === m) &&
                (sc === "" || i.scope === sc)
            );
            renderTable(filtered);
        }

        function sortTable(col) {
            sortDirection *= -1;
            const sorted = [...apiData].sort((a, b) => {
                const x = (a[col] || '').toString().toLowerCase();
                const y = (b[col] || '').toString().toLowerCase();
                return x < y ? -sortDirection : (x > y ? sortDirection : 0);
            });
            renderTable(sorted);
        }

        init();
    </script>
</body>
</html>
