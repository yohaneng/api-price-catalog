<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Price Catalog | Research Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        
        .master-sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #f8fafc;
        }

        /* REDUCED PADDING & INTERACTION */
        .clickable-row {
            cursor: pointer;
            position: relative;
            transition: background-color 0.15s ease;
        }

        .clickable-row:hover {
            background-color: #f1f5f9 !important;
            box-shadow: inset 3px 0 0 0 #3b82f6;
        }

        /* SUBDUED HOVER HINT */
        .hover-hint {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8; /* Subdued Slate */
            font-size: 11px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .clickable-row:hover .hover-hint {
            opacity: 1;
        }

        #backToTop.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <button id="backToTop" onclick="window.scrollTo(0,0)" class="hidden fixed bottom-8 right-8 bg-blue-600 text-white w-10 h-10 rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 z-[200] transition-all">
        <i class="fas fa-arrow-up text-sm"></i>
    </button>

    <div class="master-sticky-header shadow-md">
        <div class="px-4 md:px-8 pt-5 pb-3">
            <header class="mb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase">API WORLD</h1>
                    <p class="text-slate-500 text-[11px] font-bold uppercase tracking-wider">World list of APIs • Realtime Links • Pricing Audit</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="clearFilters()" class="bg-white hover:bg-slate-100 text-slate-500 px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold transition-all uppercase tracking-tighter">
                        <i class="fas fa-undo-alt mr-1"></i> Reset
                    </button>
                    <div id="counter" class="bg-slate-900 text-white px-3 py-1.5 rounded-lg font-black text-[10px] min-w-[100px] text-center uppercase tracking-widest">
                        ---
                    </div>
                </div>
            </header>

            <div class="bg-white p-2.5 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-4 gap-2.5">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search API..." class="w-full p-2 pl-8 border border-slate-100 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-xs font-medium">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-300 text-xs"></i>
                </div>
                <select id="domainFilter" class="w-full p-2 border border-slate-100 rounded-lg bg-slate-50 outline-none text-xs font-medium focus:ring-2 focus:ring-blue-500"></select>
                <select id="modelFilter" class="w-full p-2 border border-slate-100 rounded-lg bg-slate-50 outline-none text-xs font-medium focus:ring-2 focus:ring-blue-500"></select>
                <select id="scopeFilter" class="w-full p-2 border border-slate-100 rounded-lg bg-slate-50 outline-none text-xs font-medium focus:ring-2 focus:ring-blue-500"></select>
            </div>
        </div>

        <table class="min-w-full">
            <thead class="bg-slate-900 text-white">
                <tr>
                    <th onclick="sortTable('name')" class="w-[20%] px-6 py-3 text-left text-[9px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800">API Name <i class="fas fa-sort ml-1 opacity-30"></i></th>
                    <th class="w-[35%] px-6 py-3 text-left text-[9px] font-black uppercase tracking-widest">Description</th>
                    <th onclick="sortTable('domain')" class="w-[15%] px-6 py-3 text-left text-[9px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800">Domain <i class="fas fa-sort ml-1 opacity-30"></i></th>
                    <th onclick="sortTable('pricing_model')" class="w-[15%] px-6 py-3 text-left text-[9px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800">Model <i class="fas fa-sort ml-1 opacity-30"></i></th>
                    <th onclick="sortTable('current_price')" class="w-[15%] px-6 py-3 text-left text-[9px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800">Price <i class="fas fa-sort ml-1 opacity-30"></i></th>
                </tr>
            </thead>
        </table>
    </div>

    <div class="max-w-full mx-auto">
        <table class="min-w-full border-collapse">
            <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                </tbody>
        </table>
    </div>

    <script>
        let apiData = [];
        let sortDirection = 1;

        async function init() {
            try {
                let response = await fetch('./dataset_400.json', { cache: 'no-cache' });
                if (!response.ok) response = await fetch('./Dataset_400.json', { cache: 'no-cache' });
                apiData = await response.json();
                
                populateDropdown('domainFilter', 'domain');
                populateDropdown('modelFilter', 'pricing_model');
                populateDropdown('scopeFilter', 'scope');
                renderTable(apiData);
                
                ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => {
                    document.getElementById(id).addEventListener('input', applyFilters);
                });

                window.addEventListener('scroll', () => {
                    document.getElementById('backToTop').classList.toggle('hidden', window.scrollY <= 400);
                });
            } catch (err) { console.error(err); }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('domainFilter').value = '';
            document.getElementById('modelFilter').value = '';
            document.getElementById('scopeFilter').value = '';
            renderTable(apiData);
        }

        function populateDropdown(id, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
            el.innerHTML = `<option value="">All ${key}s</option>` + vals.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            document.getElementById('counter').innerText = `${data.length} / ${apiData.length} ITEMS`;

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-slate-400 text-xs font-bold uppercase tracking-widest">No matching results</td></tr>';
                return;
            }

            body.innerHTML = data.map(api => `
                <tr class="clickable-row bg-white" onclick="window.open('${api.pricing_url}', '_blank')">
                    <td class="w-[20%] px-6 py-3.5 whitespace-nowrap">
                        <span class="text-blue-600 font-bold text-sm tracking-tight">${api.name}</span>
                    </td>
                    <td class="w-[35%] px-6 py-3.5 text-xs text-slate-500 leading-normal relative">
                        ${api.description || '...'}
                        <div class="hover-hint">visit page <i class="fas fa-chevron-right text-[8px]"></i></div>
                    </td>
                    <td class="w-[15%] px-6 py-3.5 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${api.domain || 'N/A'}</td>
                    <td class="w-[15%] px-6 py-3.5 text-xs text-slate-600 font-medium">${api.pricing_model || 'N/A'}</td>
                    <td class="w-[15%] px-6 py-3.5">
                        <span class="${api.current_price ? 'text-green-600 bg-green-50' : 'text-slate-300'} text-[9px] font-black uppercase tracking-tighter">
                            ${api.current_price || 'AUDITING'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const d = document.getElementById('domainFilter').value;
            const m = document.getElementById('modelFilter').value;
            const sc = document.getElementById('scopeFilter').value;

            const filtered = apiData.filter(i => 
                (i.name.toLowerCase().includes(s)) &&
                (d === "" || i.domain === d) &&
                (m === "" || i.pricing_model === m) &&
                (sc === "" || i.scope === sc)
            );
            renderTable(filtered);
        }

        function sortTable(col) {
            sortDirection *= -1;
            const sorted = [...apiData].sort((a, b) => {
                const x = (a[col] || '').toString().toLowerCase();
                const y = (b[col] || '').toString().toLowerCase();
                return x < y ? -sortDirection : (x > y ? sortDirection : 0);
            });
            renderTable(sorted);
        }

        init();
    </script>
</body>
</html>
