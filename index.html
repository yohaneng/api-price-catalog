<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API WORLD | Global Pricing Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfdfe; }
        .glass-header { position: sticky; top: 0; z-index: 100; background: rgba(248, 250, 252, 0.98); backdrop-filter: blur(24px); border-bottom: 2px solid #e2e8f0; }

        /* Status Colors */
        .price-free { color: #10b981 !important; font-weight: 800; } 
        .price-paid { color: #3b82f6 !important; font-weight: 800; } 
        .price-sales { color: #f59e0b !important; font-weight: 800; } 
        .price-error { color: #ef4444 !important; font-weight: 800; } 

        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-trigger { width: 100%; padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 14px; background: white; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
        .dropdown-trigger.filtered { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        
        .dropdown-menu { display: none; position: absolute; top: 115%; left: 0; width: 100%; max-height: 400px; overflow-y: auto; background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); z-index: 200; }
        .dropdown-menu.show { display: block; }

        .spectrum-container { display: flex; height: 12px; width: 240px; border-radius: 12px; overflow: hidden; background: #e2e8f0; margin-top: 6px; }
        #specFree { background: #10b981; transition: width 0.5s ease; }
        #specFreemium { background: #3b82f6; transition: width 0.5s ease; }
        #specPaid { background: #f59e0b; transition: width 0.5s ease; }

        #resetBtn { transition: all 0.3s ease; opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        #resetBtn.active { opacity: 1; filter: grayscale(0); pointer-events: auto; background: #3b82f6; color: white; border-color: #3b82f6; }

        .table-fixed-head { background: #0f172a; color: white; }
        .check-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; }
        .check-item:hover { background: #f8fafc; }
        .check-item input { width: 16px; height: 16px; accent-color: #3b82f6; cursor: pointer; }
        .inner-search { width: calc(100% - 24px); padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; outline: none; margin: 12px; }
    </style>
</head>
<body class="text-slate-900" onclick="closeAllDropdowns(event)">

    <div class="glass-header">
        <div class="px-6 md:px-12 pt-6 pb-4">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-5">
                <div>
                    <h1 class="text-5xl font-[900] tracking-tighter text-slate-900 uppercase">API<span class="text-blue-600">WORLD</span></h1>
                    <p id="audit-timestamp" class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mt-1">LAST LIVE AUDIT: LOADING...</p>
                </div>
                
                <div class="flex items-center gap-8">
                    <div class="hidden xl:block text-right border-r-2 border-slate-100 pr-8">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pricing Transparency Ratio</p>
                        <div class="spectrum-container">
                            <div id="specFree"></div><div id="specFreemium"></div><div id="specPaid"></div>
                        </div>
                    </div>
                    <div id="counter" class="uppercase tracking-widest text-[13px] font-extrabold text-slate-400">---</div>
                    <button id="resetBtn" onclick="fullReset()" class="flex items-center gap-2 px-7 py-3 rounded-2xl border-2 border-slate-200 text-xs font-black">
                        <i class="fas fa-rotate-left"></i> RESET
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="relative">
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search API Name..." class="w-full p-3 pl-12 border-2 border-slate-200 rounded-xl bg-white outline-none font-semibold focus:border-blue-500">
                    <i class="fas fa-search absolute left-5 top-4 text-slate-300"></i>
                </div>

                <div class="custom-dropdown" id="dd-domain">
                    <div class="dropdown-trigger" onclick="toggleDropdown('dd-domain')"><span class="label">All Domains</span><i class="fas fa-chevron-down"></i></div>
                    <div class="dropdown-menu">
                        <div class="sticky top-0 bg-white border-b z-10">
                            <div class="check-item" onclick="toggleAll('domain')">
                                <input type="checkbox" id="master-domain"> <span class="text-[10px] font-black uppercase">Select All Categories</span>
                            </div>
                            <input type="text" placeholder="Search categories..." onkeyup="filterDropdown(this, 'list-domain')" class="inner-search">
                        </div>
                        <div id="list-domain"></div>
                    </div>
                </div>

                <div class="custom-dropdown" id="dd-pricing_model">
                    <div class="dropdown-trigger" onclick="toggleDropdown('dd-pricing_model')"><span class="label">All Types</span><i class="fas fa-chevron-down"></i></div>
                    <div class="dropdown-menu">
                        <div class="sticky top-0 bg-white border-b z-10">
                            <div class="check-item" onclick="toggleAll('pricing_model')">
                                <input type="checkbox" id="master-pricing_model"> <span class="text-[10px] font-black uppercase">Select All Types</span>
                            </div>
                        </div>
                        <div id="list-pricing_model"></div>
                    </div>
                </div>

                <div class="custom-dropdown" id="dd-scope">
                    <div class="dropdown-trigger" onclick="toggleDropdown('dd-scope')"><span class="label">All Scopes</span><i class="fas fa-chevron-down"></i></div>
                    <div class="dropdown-menu">
                        <div class="sticky top-0 bg-white border-b z-10">
                            <div class="check-item" onclick="toggleAll('scope')">
                                <input type="checkbox" id="master-scope"> <span class="text-[10px] font-black uppercase">Select All Scopes</span>
                            </div>
                        </div>
                        <div id="list-scope"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-fixed-head px-6 md:px-12">
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" class="w-[20%] py-4 pl-10 text-left text-[11px] font-black uppercase tracking-[0.2em] cursor-pointer">IDENTITY</th>
                        <th class="w-[30%] py-4 text-left text-[11px] font-black uppercase tracking-[0.2em]">DESCRIPTION</th>
                        <th class="w-[12%] py-4 text-left text-[11px] font-black uppercase tracking-[0.2em]">DOMAIN</th>
                        <th class="w-[10%] py-4 text-left text-[11px] font-black uppercase tracking-[0.2em]">SCOPE</th>
                        <th class="w-[12%] py-4 text-left text-[11px] font-black uppercase tracking-[0.2em]">MODEL</th>
                        <th class="w-[16%] py-4 text-left text-[11px] font-black uppercase tracking-[0.2em]">LIVE PRICE</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <div class="px-6 md:px-12 pb-24">
        <table class="min-w-full border-collapse"><tbody id="tableBody" class="divide-y-2 divide-slate-100"></tbody></table>
    </div>

    <script>
        let apiData = [];
        let filters = { search: '', domain: new Set(), pricing_model: new Set(), scope: new Set() };
        let sortCol = 'name', sortDir = 1;

        async function init() {
            const resp = await fetch('./dataset_400.json');
            apiData = await resp.json();
            ['domain', 'pricing_model', 'scope'].forEach(key => {
                const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
                vals.forEach(v => filters[key].add(v));
                buildDropdown(key, vals);
            });
            render();
        }

        function buildDropdown(key, vals) {
            const container = document.getElementById(`list-${key}`);
            container.innerHTML = vals.map(v => `
                <div class="check-item" data-val="${v.toLowerCase()}" onclick="toggleFilter('${key}', '${v}')">
                    <input type="checkbox" id="check-${key}-${v}" ${filters[key].has(v) ? 'checked' : ''} onclick="event.stopPropagation(); toggleFilter('${key}', '${v}')">
                    <label class="flex justify-between w-full text-xs font-bold pointer-events-none">
                        <span>${v}</span>
                        <span class="text-blue-500">${apiData.filter(x => x[key] === v).length}</span>
                    </label>
                </div>
            `).join('');
        }

        function toggleFilter(key, val) {
            if (filters[key].has(val)) filters[key].delete(val);
            else filters[key].add(val);
            render();
        }

        function toggleAll(key) {
            const all = [...new Set(apiData.map(i => i[key]))].filter(Boolean);
            if (filters[key].size === all.length) filters[key].clear();
            else all.forEach(v => filters[key].add(v));
            render();
        }

        function render() {
            let filtered = apiData.filter(i => 
                i.name.toLowerCase().includes(filters.search) &&
                filters.domain.has(i.domain) &&
                filters.pricing_model.has(i.pricing_model) &&
                filters.scope.has(i.scope)
            );

            filtered.sort((a,b) => (a[sortCol] > b[sortCol] ? 1 : -1) * sortDir);

            document.getElementById('tableBody').innerHTML = filtered.map(api => {
                const price = api.current_price || "PENDING";
                let colorClass = "text-slate-400";
                if (price.includes("$0") || price.toLowerCase().includes("free")) colorClass = "price-free";
                else if (price.includes("$")) colorClass = "price-paid";
                else if (price.toLowerCase().includes("sales")) colorClass = "price-sales";
                else if (price.includes("Error")) colorClass = "price-error";

                return `
                <tr class="clickable-row bg-white hover:bg-slate-50" onclick="window.open('${api.pricing_url}', '_blank')">
                    <td class="w-[20%] py-5 pl-10 pr-4 font-black text-blue-600">${api.name}</td>
                    <td class="w-[30%] py-5 pr-12 text-[12px] text-slate-500 font-medium leading-tight">${api.description || '...'}</td>
                    <td class="w-[12%] py-5 text-[10px] font-bold text-slate-400 uppercase">${api.domain}</td>
                    <td class="w-[10%] py-5 text-[10px] font-bold text-slate-400 uppercase">${api.scope}</td>
                    <td class="w-[12%] py-5 text-[11px] text-slate-700 font-bold">${api.pricing_model}</td>
                    <td class="w-[16%] py-5 text-[11px] font-black uppercase tracking-tighter ${colorClass}">${price}</td>
                </tr>
            `}).join('');

            updateUI(filtered);
        }

        function updateUI(filtered) {
            // Update Infographics with exact price detection
            const total = filtered.length || 1;
            const f = filtered.filter(i => (i.current_price || '').toLowerCase().includes('free')).length;
            const p = filtered.filter(i => (i.current_price || '').includes('$')).length;
            const s = filtered.filter(i => (i.current_price || '').toLowerCase().includes('sales')).length;

            document.getElementById('specFree').style.width = (f / total * 100) + '%';
            document.getElementById('specFreemium').style.width = (p / total * 100) + '%';
            document.getElementById('specPaid').style.width = (s / total * 100) + '%';

            // Update Master Checkboxes & Dropdown Labels
            ['domain', 'pricing_model', 'scope'].forEach(key => {
                const totalVals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).length;
                const count = filters[key].size;
                const master = document.getElementById(`master-${key}`);
                if(master) {
                    master.checked = count === totalVals;
                    master.indeterminate = count > 0 && count < totalVals;
                }

                const trig = document.querySelector(`#dd-${key} .dropdown-trigger`);
                trig.classList.toggle('filtered', count < totalVals);
                trig.querySelector('.label').innerText = count < totalVals ? `${count} Selected` : `All ${key === 'pricing_model' ? 'Types' : key + 's'}`;

                document.querySelectorAll(`#list-${key} input`).forEach(cb => {
                    const val = cb.parentElement.innerText.split('\n')[0].trim();
                    cb.checked = filters[key].has(val);
                });
            });

            const dates = apiData.map(d => d.last_audited).filter(Boolean).sort().reverse();
            document.getElementById('audit-timestamp').innerText = `LAST LIVE AUDIT: ${dates[0] || 'STALE'}`;
            document.getElementById('counter').innerText = `${filtered.length} / ${apiData.length} NODES`;
            document.getElementById('resetBtn').classList.toggle('active', filtered.length < apiData.length);
        }

        function filterDropdown(input, listId) {
            const term = input.value.toLowerCase();
            document.querySelectorAll(`#${listId} .check-item`).forEach(el => el.style.display = el.innerText.toLowerCase().includes(term) ? 'flex' : 'none');
        }
        function applyFilters() { filters.search = document.getElementById('searchInput').value.toLowerCase(); render(); }
        function toggleDropdown(id) { 
            const menu = document.querySelector(`#${id} .dropdown-menu`);
            const show = menu.classList.contains('show');
            closeAllDropdowns();
            if(!show) menu.classList.add('show');
        }
        function closeAllDropdowns(e) { if (e && e.target.closest('.custom-dropdown')) return; document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show')); }
        function sortTable(col) { if(sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; } render(); }
        function fullReset() { location.reload(); }
        init();
    </script>
</body>
</html>
