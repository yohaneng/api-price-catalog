<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Price Catalog | Research Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">API Pricing Catalog</h1>
            <p class="text-slate-600 text-lg">A research-driven directory of 400+ APIs with advanced filtering and sorting.</p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Search APIs</label>
                    <input type="text" id="searchInput" placeholder="Search by name..." class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none border-slate-300">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Domain</label>
                    <select id="domainFilter" class="w-full p-2.5 border rounded-lg bg-white border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Pricing Model</label>
                    <select id="modelFilter" class="w-full p-2.5 border rounded-lg bg-white border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
                 <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Scope</label>
                    <select id="scopeFilter" class="w-full p-2.5 border rounded-lg bg-white border-slate-300 outline-none focus:ring-2 focus:ring-blue-500"></select>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-slate-200" id="apiTable">
                    <thead class="bg-slate-100">
                        <tr>
                            <th onclick="sortTable('name')" class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors">
                                Name <i class="fa-solid fa-sort ml-1 opacity-50"></i>
                            </th>
                            <th onclick="sortTable('domain')" class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors">
                                Domain <i class="fa-solid fa-sort ml-1 opacity-50"></i>
                            </th>
                            <th onclick="sortTable('pricing_model')" class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors">
                                Pricing Model <i class="fa-solid fa-sort ml-1 opacity-50"></i>
                            </th>
                            <th onclick="sortTable('current_price')" class="px-6 py-4 text-left text-xs font-bold text-slate-600 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors">
                                Current Price <i class
