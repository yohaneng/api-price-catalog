<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API WORLD | Global Pricing Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfdfe; }
        html { scroll-behavior: smooth; }
        
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(24px);
            border-bottom: 2px solid #e2e8f0;
        }

        /* CATEGORY OVERLAY STYLES */
        #categoryOverlay {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 320px;
            max-height: 450px;
            overflow-y: auto;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 16px;
            z-index: 150;
        }

        #topDomainsBox:hover #categoryOverlay { display: block; }

        .spectrum-container {
            display: flex;
            height: 10px;
            width: 180px;
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            margin-top: 6px;
        }
        #specFree { background: #10b981; transition: width 0.5s ease; }
        #specFreemium { background: #3b82f6; transition: width 0.5s ease; }
        #specPaid { background: #f59e0b; transition: width 0.5s ease; }

        .pulse-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        #resetBtn { transition: all 0.3s ease; opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        #resetBtn.active { opacity: 1; filter: grayscale(0); pointer-events: auto; background: #ef4444; color: white; }

        .clickable-row:hover { background-color: #f1f5f9 !important; box-shadow: inset 12px 0 0 0 #3b82f6; }
        .hover-hint { color: #3b82f6; font-size: 10px; font-weight: 700; opacity: 0; transition: 0.2s; margin-left: 8px; display: inline-flex; align-items: center; gap: 4px; }
        .clickable-row:hover .hover-hint { opacity: 1; }

        /* CUSTOM CHECKBOX STYLE */
        .check-container { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 0; }
        .check-container input { cursor: pointer; width: 14px; height: 14px; }
    </style>
</head>
<body class="text-slate-900">

    <button id="backToTop" onclick="window.scrollTo(0,0)" class="hidden fixed bottom-10 right-10 bg-slate-900 text-white w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center hover:bg-blue-600 z-[200] transition-all">
        <i class="fas fa-chevron-up text-xl"></i>
    </button>

    <div class="glass-header">
        <div class="px-6 md:px-12 pt-5 pb-2">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-4">
                <div class="flex items-center gap-8">
                    <div>
                        <div class="flex items-center">
                            <span class="pulse-icon"></span>
                            <h1 class="text-5xl font-[900] tracking-tighter text-slate-900 uppercase">API<span class="text-blue-600">WORLD</span></h1>
                        </div>
                        <p class="text-[12px] font-extrabold text-slate-400 uppercase tracking-[0.3em] mt-1">Realtime Pricing Feed</p>
                    </div>

                    <div class="hidden xl:block border-l-2 border-slate-200 pl-8">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Model Ratio</p>
                        <div class="spectrum-container">
                            <div id="specFree"></div>
                            <div id="specFreemium"></div>
                            <div id="specPaid"></div>
                        </div>
                        <div class="flex gap-3 mt-1.5">
                            <span class="text-[9px] font-bold text-slate-400"><i class="fas fa-circle text-emerald-500 mr-1"></i> FREE</span>
                            <span class="text-[9px] font-bold text-slate-400"><i class="fas fa-circle text-blue-500 mr-1"></i> FREEMIUM</span>
                        </div>
                    </div>

                    <div id="topDomainsBox" class="hidden 2xl:block border-l-2 border-slate-200 pl-8 relative cursor-help">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Domain Insights <i class="fas fa-filter ml-1 opacity-30"></i></p>
                        <div id="domainPills" class="flex gap-2 mt-1.5"></div>
                        
                        <div id="categoryOverlay">
                            <div class="flex justify-between items-center mb-3 border-b pb-2">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Domains</p>
                                <button onclick="clearDomainSelection()" class="text-[9px] font-bold text-blue-600 hover:underline">Select All</button>
                            </div>
                            <div id="fullCategoryList" class="space-y-1"></div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="hidden xl:flex items-center gap-6 mr-4 border-r-2 border-slate-200 pr-8">
                        <div class="text-center">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Global Diversity</p>
                            <p id="diversityStat" class="text-[14px] font-black text-blue-600">--</p>
                        </div>
                    </div>
                    
                    <button id="resetBtn" onclick="clearFilters()" class="flex items-center gap-2 bg-white text-slate-400 px-6 py-2.5 rounded-2xl border-2 border-slate-200 text-xs font-black transition-all shadow-sm">
                        <i class="fas fa-filter-circle-xmark"></i> RESET
                    </button>
                    <div id="counter" class="bg-slate-900 text-white px-8 py-2.5 rounded-2xl font-black text-sm min-w-[140px] text-center shadow-xl">
                        ---
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-2">
                <div class="relative group">
                    <input type="text" id="searchInput" placeholder="Search API Name..." class="w-full p-2.5 pl-11 border-2 border-slate-200 rounded-xl bg-white focus:ring-4 focus:ring-blue-500/10 outline-none text-sm font-semibold transition-all">
                    <i class="fas fa-search absolute left-4 top-3.5 text-slate-300 group-focus-within:text-blue-500"></i>
                </div>
                <select id="modelFilter" class="w-full p-2.5 border-2 border-slate-200 rounded-xl bg-white outline-none text-sm font-bold text-slate-600 cursor-pointer"></select>
                <select id="scopeFilter" class="w-full p-2.5 border-2 border-slate-200 rounded-xl bg-white outline-none text-sm font-bold text-slate-600 cursor-pointer"></select>
            </div>
        </div>

        <div class="bg-slate-900 px-6 md:px-12 border-b-2 border-slate-800">
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" class="w-[20%] py-3.5 pl-10 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 group">API IDENTITY <i class="fas fa-sort ml-1 opacity-20"></i></th>
                        <th class="w-[38%] py-3.5 text-left text-[14px] font-black text-white uppercase tracking-[0.2em]">DESCRIPTION</th>
                        <th onclick="sortTable('domain')" class="w-[15%] py-3.5 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400">DOMAIN</th>
                        <th onclick="sortTable('pricing_model')" class="w-[12%] py-3.5 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400">TYPE</th>
                        <th onclick="sortTable('current_price')" class="w-[15%] py-3.5 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400">PRICING</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <div class="px-6 md:px-12 pb-24">
        <table class="min-w-full border-collapse">
            <tbody id="tableBody" class="divide-y-2 divide-slate-100"></tbody>
        </table>
    </div>

    <script>
        let apiData = [];
        let sortDirection = 1;
        let selectedDomains = new Set();

        async function init() {
            try {
                let response = await fetch('./dataset_400.json', { cache: 'no-cache' });
                if (!response.ok) response = await fetch('./Dataset_400.json', { cache: 'no-cache' });
                apiData = await response.json();
                
                // Set initial domains to all
                apiData.forEach(i => selectedDomains.add(i.domain));
                
                populateDropdown('modelFilter', 'pricing_model');
                populateDropdown('scopeFilter', 'scope');
                renderTable(apiData);
                
                ['searchInput', 'modelFilter', 'scopeFilter'].forEach(id => {
                    document.getElementById(id).addEventListener('input', () => { applyFilters(); toggleResetBtn(); });
                });
                
                window.addEventListener('scroll', () => {
                    document.getElementById('backToTop').classList.toggle('hidden', window.scrollY <= 400);
                });
            } catch (err) { console.error(err); }
        }

        function updateInfographics(filteredData) {
            const total = filteredData.length || 1;
            
            // 1. Model Ratio
            const free = (filteredData.filter(i => i.pricing_model === 'Free').length / total) * 100;
            const freemium = (filteredData.filter(i => i.pricing_model === 'Freemium').length / total) * 100;
            document.getElementById('specFree').style.width = free + '%';
            document.getElementById('specFreemium').style.width = freemium + '%';
            document.getElementById('specPaid').style.width = (100 - free - freemium) + '%';

            // 2. Diversity
            const globalCount = filteredData.filter(i => i.scope === 'Global').length;
            document.getElementById('diversityStat').innerText = Math.round((globalCount / total) * 100) + '% Global';

            // 3. Dynamic Category List with Checkboxes
            const allCounts = {};
            apiData.forEach(i => allCounts[i.domain] = (allCounts[i.domain] || 0) + 1);
            const sortedDomains = Object.keys(allCounts).sort((a,b) => allCounts[b] - allCounts[a]);

            document.getElementById('fullCategoryList').innerHTML = sortedDomains.map(d => `
                <div class="check-container">
                    <input type="checkbox" id="check-${d}" ${selectedDomains.has(d) ? 'checked' : ''} onchange="toggleDomain('${d}')">
                    <label for="check-${d}" class="flex justify-between w-full text-[11px] font-bold">
                        <span class="${selectedDomains.has(d) ? 'text-slate-900' : 'text-slate-400'}">${d}</span>
                        <span class="text-blue-600 bg-blue-50 px-2 rounded-full">${allCounts[d]}</span>
                    </label>
                </div>
            `).join('');

            // Pills for Top 3 Selected
            const displayPills = Array.from(selectedDomains).slice(0, 3);
            document.getElementById('domainPills').innerHTML = displayPills.map(d => 
                `<span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[9px] font-black">${d.toUpperCase()}</span>`
            ).join('') + (selectedDomains.size > 3 ? `<span class="text-[9px] font-bold text-slate-400">+${selectedDomains.size - 3}</span>` : '');
        }

        function toggleDomain(domain) {
            if (selectedDomains.has(domain)) selectedDomains.delete(domain);
            else selectedDomains.add(domain);
            applyFilters();
            toggleResetBtn();
        }

        function clearDomainSelection() {
            apiData.forEach(i => selectedDomains.add(i.domain));
            applyFilters();
            toggleResetBtn();
        }

        function toggleResetBtn() {
            const hasInput = document.getElementById('searchInput').value !== '';
            const isPartialDomains = selectedDomains.size < new Set(apiData.map(i => i.domain)).size;
            document.getElementById('resetBtn').classList.toggle('active', hasInput || isPartialDomains);
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('modelFilter').value = '';
            document.getElementById('scopeFilter').value = '';
            clearDomainSelection();
        }

        function populateDropdown(id, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
            el.innerHTML = `<option value="">ALL ${key.toUpperCase()}S</option>` + vals.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            document.getElementById('counter').innerText = `${data.length} / ${apiData.length} NODES`;
            updateInfographics(data);

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="py-32 text-center text-slate-300 font-bold uppercase tracking-widest text-sm">No Results Found</td></tr>';
                return;
            }
            body.innerHTML = data.map(api => `
                <tr class="clickable-row group bg-white" onclick="window.open('${api.pricing_url}', '_blank')">
                    <td class="w-[20%] py-5 pl-10 pr-4">
                        <span class="text-blue-600 font-black text-[15px] tracking-tight group-hover:text-blue-800 transition-colors">${api.name}</span>
                        <span class="hover-hint">visit site <i class="fas fa-chevron-right ml-1"></i></span>
                    </td>
                    <td class="w-[38%] py-5 pr-12 text-[13px] text-slate-500 font-semibold leading-relaxed relative">${api.description || '...'}</td>
                    <td class="w-[15%] py-5 text-[11px] font-black text-slate-400 uppercase tracking-tighter">${api.domain || 'N/A'}</td>
                    <td class="w-[12%] py-5 text-[12px] text-slate-700 font-black tracking-tighter">${api.pricing_model || 'N/A'}</td>
                    <td class="w-[15%] py-5 text-[11px] font-black uppercase tracking-tighter ${api.current_price ? 'text-emerald-600' : 'text-slate-300'}">
                        ${api.current_price || 'AUDITING'}
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const m = document.getElementById('modelFilter').value;
            const sc = document.getElementById('scopeFilter').value;

            const filtered = apiData.filter(i => 
                (i.name.toLowerCase().includes(s)) &&
                (selectedDomains.has(i.domain)) &&
                (m === "" || i.pricing_model === m) &&
                (sc === "" || i.scope === sc)
            );
            renderTable(filtered);
        }

        function sortTable(col) {
            sortDirection *= -1;
            const sorted = [...apiData].sort((a, b) => {
                const x = (a[col] || '').toString().toLowerCase();
                const y = (b[col] || '').toString().toLowerCase();
                return x < y ? -sortDirection : (x > y ? sortDirection : 0);
            });
            renderTable(sorted);
        }
        init();
    </script>
</body>
</html>
