<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API WORLD | Global Pricing Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfdfe; }
        html { scroll-behavior: smooth; }
        
        .glass-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(248, 250, 252, 0.98);
            backdrop-filter: blur(24px); border-bottom: 2px solid #e2e8f0;
        }

        /* CUSTOM DROPDOWN SYSTEM */
        .custom-dropdown { position: relative; width: 100%; }
        .dropdown-trigger {
            width: 100%; padding: 12px 20px; border: 2px solid #e2e8f0;
            border-radius: 14px; background: white; font-size: 14px; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            transition: all 0.2s;
        }
        .dropdown-trigger:hover { border-color: #cbd5e1; }
        .dropdown-trigger.filtered { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
        .dropdown-trigger.filtered i { color: #3b82f6; }

        /* INCREASED PADDING FOR ARROW */
        .dropdown-trigger i { margin-left: auto; padding-left: 10px; }

        .dropdown-menu {
            display: none; position: absolute; top: 115%; left: 0; width: 100%;
            max-height: 400px; overflow-y: auto; background: white;
            border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            z-index: 200;
        }
        .dropdown-menu.show { display: block; }

        /* OVERLAY STYLES */
        #categoryOverlay {
            display: none; position: absolute; top: 100%; left: 0; width: 340px;
            max-height: 450px; overflow-y: auto; background: white;
            border: 1px solid #e2e8f0; border-radius: 20px; box-shadow: 0 25px 30px -5px rgba(0,0,0,0.1);
            z-index: 150;
        }
        #topDomainsBox:hover #categoryOverlay { display: block; }
        .overlay-sticky-header { position: sticky; top: 0; background: white; padding: 16px; border-bottom: 1px solid #f1f5f9; z-index: 10; }

        /* INFOGRAPHICS */
        .spectrum-container { display: flex; height: 12px; width: 200px; border-radius: 12px; overflow: hidden; background: #e2e8f0; margin-top: 6px; }
        #specFree { background: #10b981; transition: width 0.5s ease; }
        #specFreemium { background: #3b82f6; transition: width 0.5s ease; }
        #specPaid { background: #f59e0b; transition: width 0.5s ease; }

        #resetBtn { transition: all 0.3s ease; opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        #resetBtn.active { opacity: 1; filter: grayscale(0); pointer-events: auto; background: #ef4444; color: white; }

        /* NON-BUTTON COUNTER STYLE */
        #counter {
            background: transparent; border: none; color: #64748b; font-weight: 800; font-size: 13px;
            letter-spacing: 0.05em; padding: 0; min-width: auto; shadow: none;
        }

        .table-fixed-head { background: #0f172a; color: white; }

        /* CLICKABLE ROW WITH LEFT ACCENT */
        .clickable-row:hover { background-color: #f1f5f9 !important; box-shadow: inset 12px 0 0 0 #3b82f6; }
        
        .check-item { display: flex; align-items: center; gap: 12px; padding: 10px 18px; cursor: pointer; transition: background 0.15s; }
        .check-item:hover { background: #f8fafc; }
        .check-item input { pointer-events: none; width: 18px; height: 18px; accent-color: #3b82f6; }

        button:disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body class="text-slate-900" onclick="closeAllDropdowns(event)">

    <div class="glass-header">
        <div class="px-6 md:px-12 pt-6 pb-4">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-5">
                <div class="flex items-center gap-10">
                    <div>
                        <h1 class="text-5xl font-[900] tracking-tighter text-slate-900 uppercase">API<span class="text-blue-600">WORLD</span></h1>
                        <p class="text-[12px] font-extrabold text-slate-400 uppercase tracking-[0.3em] mt-1">Realtime Pricing Feed</p>
                    </div>

                    <div id="topDomainsBox" class="hidden 2xl:block border-l-2 border-slate-200 pl-10 relative cursor-help">
                        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                            Domain Insights <span id="domainCountBadge" class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full text-[9px] tracking-normal">---</span>
                        </p>
                        <div id="domainPills" class="flex gap-2 mt-2"></div>
                        <div id="categoryOverlay">
                            <div class="overlay-sticky-header flex justify-between items-center">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Global Audit</p>
                                <div class="flex gap-3">
                                    <button onclick="selectAll('domain')" class="text-[9px] font-bold text-blue-600">SELECT ALL</button>
                                    <button id="domainDeselect" onclick="deselectAll('domain')" class="text-[9px] font-bold text-red-500">DESELECT ALL</button>
                                </div>
                            </div>
                            <div id="overlayList"></div>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-8">
                    <div class="hidden xl:block text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pricing Ratio</p>
                        <div class="spectrum-container">
                            <div id="specFree"></div><div id="specFreemium"></div><div id="specPaid"></div>
                        </div>
                    </div>
                    <div id="counter" class="uppercase tracking-widest border-r-2 border-slate-100 pr-8 hidden md:block">---</div>
                    
                    <button id="resetBtn" onclick="fullReset()" class="flex items-center gap-2 bg-white text-slate-400 px-7 py-3 rounded-2xl border-2 border-slate-200 text-xs font-black transition-all shadow-sm">
                        <i class="fas fa-filter-circle-xmark"></i> RESET
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                <div class="relative">
                    <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Search API Name..." class="w-full p-3 pl-12 border-2 border-slate-200 rounded-xl bg-white outline-none text-sm font-semibold focus:border-blue-500">
                    <i class="fas fa-search absolute left-5 top-4 text-slate-300"></i>
                </div>

                <div class="custom-dropdown" id="dd-domain">
                    <div class="dropdown-trigger" onclick="toggleDropdown('dd-domain')">
                        <span class="label">All Domains</span><i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="overlay-sticky-header flex justify-between px-4 py-3 border-b">
                            <button onclick="selectAll('domain')" class="text-[9px] font-bold text-blue-600">ALL</button>
                            <button onclick="deselectAll('domain')" class="text-[9px] font-bold text-red-500">NONE</button>
                        </div>
                        <div class="list-container"></div>
                    </div>
                </div>

                <div class="custom-dropdown" id="dd-pricing_model">
                    <div class="dropdown-trigger" onclick="toggleDropdown('dd-pricing_model')">
                        <span class="label">All Pricing Models</span><i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="overlay-sticky-header flex justify-between px-4 py-3 border-b">
                            <button onclick="selectAll('pricing_model')" class="text-[9px] font-bold text-blue-600">ALL</button>
                            <button onclick="deselectAll('pricing_model')" class="text-[9px] font-bold text-red-500">NONE</button>
                        </div>
                        <div class="list-container"></div>
                    </div>
                </div>

                <div class="custom-dropdown" id="dd-scope">
                    <div class="dropdown-trigger" onclick="toggleDropdown('dd-scope')">
                        <span class="label">All Scopes</span><i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu">
                        <div class="overlay-sticky-header flex justify-between px-4 py-3 border-b">
                            <button onclick="selectAll('scope')" class="text-[9px] font-bold text-blue-600">ALL</button>
                            <button onclick="deselectAll('scope')" class="text-[9px] font-bold text-red-500">NONE</button>
                        </div>
                        <div class="list-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-fixed-head px-6 md:px-12 border-b-2 border-slate-800">
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" class="w-[20%] py-4 pl-10 text-left text-[14px] font-black uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 group">IDENTITY <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i></th>
                        <th class="w-[30%] py-4 text-left text-[14px] font-black uppercase tracking-[0.2em]">DESCRIPTION</th>
                        <th onclick="sortTable('domain')" class="w-[12%] py-4 text-left text-[14px] font-black uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 group">DOMAIN <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i></th>
                        <th onclick="sortTable('scope')" class="w-[10%] py-4 text-left text-[14px] font-black uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 group">SCOPE <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i></th>
                        <th onclick="sortTable('pricing_model')" class="w-[12%] py-4 text-left text-[14px] font-black uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 group">TYPE <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i></th>
                        <th onclick="sortTable('current_price')" class="w-[16%] py-4 text-left text-[14px] font-black uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 group">PRICING <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i></th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <div class="px-6 md:px-12 pb-24">
        <table class="min-w-full border-collapse">
            <tbody id="tableBody" class="divide-y-2 divide-slate-100"></tbody>
        </table>
    </div>

    <script>
        let apiData = [];
        let filters = { search: '', domain: new Set(), pricing_model: new Set(), scope: new Set() };
        let sortCol = 'name', sortDir = 1;

        async function init() {
            try {
                const resp = await fetch('./dataset_400.json');
                apiData = await resp.json();
                ['domain', 'pricing_model', 'scope'].forEach(key => {
                    const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
                    vals.forEach(v => filters[key].add(v));
                    buildDropdown(key, vals);
                });
                render();
            } catch (err) { console.error("Loading Error:", err); }
        }

        function buildDropdown(key, vals) {
            const container = document.querySelector(`#dd-${key} .list-container`);
            container.innerHTML = vals.map(v => `
                <div class="check-item" onclick="toggleFilter('${key}', '${v}')">
                    <input type="checkbox" id="check-${key}-${v}" ${filters[key].has(v) ? 'checked' : ''}>
                    <label class="flex justify-between w-full cursor-pointer">
                        <span>${v}</span>
                        <span class="text-blue-500 font-bold">${apiData.filter(x => x[key] === v).length}</span>
                    </label>
                </div>
            `).join('');
        }

        function toggleFilter(key, val) {
            if (filters[key].has(val)) filters[key].delete(val);
            else filters[key].add(val);
            render();
        }

        function selectAll(key) {
            [...new Set(apiData.map(i => i[key]))].filter(Boolean).forEach(v => filters[key].add(v));
            render();
        }

        function deselectAll(key) {
            filters[key].clear();
            render();
        }

        function toggleDropdown(id) {
            const el = document.querySelector(`#${id} .dropdown-menu`);
            const isShown = el.classList.contains('show');
            closeAllDropdowns();
            if (!isShown) el.classList.add('show');
        }

        function closeAllDropdowns(e) {
            if (e && e.target.closest('.custom-dropdown')) return;
            document.querySelectorAll('.dropdown-menu').forEach(d => d.classList.remove('show'));
        }

        function applyFilters() {
            filters.search = document.getElementById('searchInput').value.toLowerCase();
            render();
        }

        function render() {
            let filtered = apiData.filter(i => 
                (i.name.toLowerCase().includes(filters.search)) &&
                filters.domain.has(i.domain) &&
                filters.pricing_model.has(i.pricing_model) &&
                filters.scope.has(i.scope)
            );

            filtered.sort((a,b) => {
                const valA = (a[sortCol] || '').toString().toLowerCase();
                const valB = (b[sortCol] || '').toString().toLowerCase();
                return (valA > valB ? 1 : -1) * sortDir;
            });

            document.getElementById('tableBody').innerHTML = filtered.map(api => `
                <tr class="clickable-row group bg-white" onclick="window.open('${api.pricing_url}', '_blank')">
                    <td class="w-[20%] py-5 pl-10 pr-4">
                        <span class="text-blue-600 font-black text-[15px]">${api.name}</span>
                        <span class="hover-hint text-[10px] font-bold text-blue-500 ml-2 opacity-0 group-hover:opacity-100 transition-opacity">visit site <i class="fas fa-chevron-right"></i></span>
                    </td>
                    <td class="w-[30%] py-5 pr-12 text-[13px] text-slate-500 font-semibold leading-relaxed">${api.description || '...'}</td>
                    <td class="w-[12%] py-5 text-[11px] font-black text-slate-400 uppercase tracking-tighter">${api.domain}</td>
                    <td class="w-[10%] py-5 text-[11px] font-black text-slate-400 uppercase tracking-tighter">${api.scope}</td>
                    <td class="w-[12%] py-5 text-[12px] text-slate-700 font-black tracking-tighter">${api.pricing_model}</td>
                    <td class="w-[16%] py-5 text-[11px] font-black uppercase tracking-tighter ${api.current_price ? 'text-emerald-600' : 'text-slate-300'}">${api.current_price || 'AUDITING'}</td>
                </tr>
            `).join('');

            updateInfographics(filtered);
            updateVisuals();
        }

        function updateInfographics(data) {
            const total = data.length || 1;
            document.getElementById('specFree').style.width = (data.filter(i => i.pricing_model === 'Free').length / total * 100) + '%';
            document.getElementById('specFreemium').style.width = (data.filter(i => i.pricing_model === 'Freemium').length / total * 100) + '%';
            document.getElementById('specPaid').style.width = (data.filter(i => i.pricing_model === 'Paid').length / total * 100) + '%';

            const domains = [...new Set(apiData.map(i => i.domain))].sort();
            document.getElementById('overlayList').innerHTML = domains.map(d => `
                <div class="check-item" onclick="toggleFilter('domain', '${d}')">
                    <input type="checkbox" ${filters.domain.has(d) ? 'checked' : ''}>
                    <label class="flex justify-between w-full cursor-pointer">
                        <span class="${filters.domain.has(d) ? 'text-slate-900' : 'text-slate-400'}">${d}</span>
                        <span class="text-blue-600 font-bold">${apiData.filter(x => x.domain === d).length}</span>
                    </label>
                </div>
            `).join('');

            const counts = {}; data.forEach(i => counts[i.domain] = (counts[i.domain] || 0) + 1);
            const top = Object.keys(counts).sort((a,b) => counts[b] - counts[a]).slice(0,3);
            document.getElementById('domainPills').innerHTML = top.map(d => `<span class="bg-blue-600 text-white px-2 py-0.5 rounded text-[9px] font-black">${d.toUpperCase()}</span>`).join('');
            
            document.getElementById('domainCountBadge').innerText = `${filters.domain.size} ACTIVE`;
            document.getElementById('domainDeselect').disabled = filters.domain.size === 0;
            document.getElementById('counter').innerText = `${data.length} / ${apiData.length} NODES`;
            document.getElementById('resetBtn').classList.toggle('active', data.length < apiData.length);
        }

        function updateVisuals() {
            ['domain', 'pricing_model', 'scope'].forEach(key => {
                const trig = document.querySelector(`#dd-${key} .dropdown-trigger`);
                const allLen = new Set(apiData.map(i => i[key])).size;
                const isFilt = filters[key].size < allLen;
                
                trig.classList.toggle('filtered', isFilt);
                
                let defaultLabel = `All ${key === 'pricing_model' ? 'Pricing Models' : key + 's'}`;
                trig.querySelector('.label').innerText = isFilt ? `${filters[key].size} Selected` : defaultLabel;
                trig.querySelector('i').className = isFilt ? 'fas fa-filter mr-2' : 'fas fa-chevron-down mr-2';
                
                document.querySelectorAll(`#dd-${key} input`).forEach(input => {
                    const val = input.id.split('-').pop();
                    input.checked = filters[key].has(val);
                });
            });
        }

        function fullReset() {
            document.getElementById('searchInput').value = '';
            filters.search = '';
            ['domain', 'pricing_model', 'scope'].forEach(key => {
                const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean);
                vals.forEach(v => filters[key].add(v));
            });
            render();
        }

        function sortTable(col) {
            if(sortCol === col) sortDir *= -1;
            else { sortCol = col; sortDir = 1; }
            render();
        }

        init();
    </script>
</body>
</html>
