<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API WORLD | Global Pricing Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfdfe; }
        html { scroll-behavior: smooth; }
        
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(24px);
            border-bottom: 2px solid #e2e8f0;
        }

        /* INCREASED INFOGRAPHIC SIZE */
        .spectrum-container {
            display: flex;
            height: 10px; /* Increased height */
            width: 200px; /* Increased width */
            border-radius: 12px;
            overflow: hidden;
            background: #e2e8f0;
            margin-top: 6px;
        }
        .spec-free { background: #10b981; width: 45%; }
        .spec-freemium { background: #3b82f6; width: 40%; }
        .spec-paid { background: #f59e0b; width: 15%; }

        .pulse-icon {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        #resetBtn {
            transition: all 0.3s ease;
            opacity: 0.3;
            filter: grayscale(1);
            pointer-events: none;
        }

        #resetBtn.active {
            opacity: 1;
            filter: grayscale(0);
            pointer-events: auto;
            background: #ef4444;
            color: white;
            transform: scale(1.05);
        }

        .clickable-row:hover {
            background-color: #f1f5f9 !important;
            box-shadow: inset 6px 0 0 0 #3b82f6;
        }

        .hover-hint {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: #3b82f6;
            font-size: 11px;
            font-weight: 800;
            opacity: 0;
            transition: 0.2s;
        }

        .clickable-row:hover .hover-hint { opacity: 1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <button id="backToTop" onclick="window.scrollTo(0,0)" class="hidden fixed bottom-10 right-10 bg-slate-900 text-white w-14 h-14 rounded-2xl shadow-2xl flex items-center justify-center hover:bg-blue-600 z-[200] transition-all">
        <i class="fas fa-chevron-up text-xl"></i>
    </button>

    <div class="glass-header">
        <div class="px-6 md:px-12 py-5">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-4">
                <div class="flex items-center gap-10">
                    <div>
                        <div class="flex items-center">
                            <span class="pulse-icon"></span>
                            <h1 class="text-5xl font-[900] tracking-tighter text-slate-900 uppercase">API<span class="text-blue-600">WORLD</span></h1>
                        </div>
                        <p class="text-[12px] font-extrabold text-slate-400 uppercase tracking-[0.3em] mt-2">The Global Pricing Audit Feed</p>
                    </div>

                    <div class="hidden xl:block border-l-2 border-slate-200 pl-10">
                        <p class="text-[11px] font-black text-slate-500 uppercase tracking-widest">Model Distribution</p>
                        <div class="spectrum-container">
                            <div class="spec-free"></div>
                            <div class="spec-freemium"></div>
                            <div class="spec-paid"></div>
                        </div>
                        <div class="flex gap-4 mt-2">
                            <span class="text-[10px] font-bold text-slate-500"><i class="fas fa-circle text-emerald-500 mr-1.5"></i> FREE</span>
                            <span class="text-[10px] font-bold text-slate-500"><i class="fas fa-circle text-blue-500 mr-1.5"></i> FREEMIUM</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <div class="hidden xl:flex items-center gap-8 mr-6 border-r-2 border-slate-200 pr-10">
                        <div class="text-center">
                            <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Auth Standard</p>
                            <p class="text-[14px] font-black text-slate-800">OAuth / Key</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Access Diversity</p>
                            <p class="text-[14px] font-black text-blue-600">Global Coverage</p>
                        </div>
                    </div>
                    
                    <button id="resetBtn" onclick="clearFilters()" class="flex items-center gap-2 bg-white text-slate-400 px-6 py-3 rounded-2xl border-2 border-slate-200 text-xs font-black transition-all shadow-sm">
                        <i class="fas fa-filter-circle-xmark text-lg"></i> RESET
                    </button>
                    <div id="counter" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-sm min-w-[150px] text-center shadow-xl tracking-widest">
                        LOADING...
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <div class="relative group">
                    <input type="text" id="searchInput" placeholder="Search Identity..." class="w-full p-3 pl-11 border-2 border-slate-200 rounded-xl bg-white focus:ring-4 focus:ring-blue-500/10 outline-none text-sm font-semibold transition-all">
                    <i class="fas fa-search absolute left-4 top-4 text-slate-300 text-lg group-focus-within:text-blue-500"></i>
                </div>
                <select id="domainFilter" class="w-full p-3 border-2 border-slate-200 rounded-xl bg-white outline-none text-sm font-bold text-slate-600 focus:ring-4 focus:ring-blue-500/10 cursor-pointer"></select>
                <select id="modelFilter" class="w-full p-3 border-2 border-slate-200 rounded-xl bg-white outline-none text-sm font-bold text-slate-600 focus:ring-4 focus:ring-blue-500/10 cursor-pointer"></select>
                <select id="scopeFilter" class="w-full p-3 border-2 border-slate-200 rounded-xl bg-white outline-none text-sm font-bold text-slate-600 focus:ring-4 focus:ring-blue-500/10 cursor-pointer"></select>
            </div>
        </div>

        <div class="bg-slate-900 px-6 md:px-12 border-b-2 border-slate-800">
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" class="w-[20%] py-4 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 transition-colors group">
                            API IDENTITY <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                        <th class="w-[38%] py-4 text-left text-[14px] font-black text-white uppercase tracking-[0.2em]">
                            DESCRIPTION
                        </th>
                        <th onclick="sortTable('domain')" class="w-[15%] py-4 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 transition-colors group">
                            DOMAIN <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                        <th onclick="sortTable('pricing_model')" class="w-[12%] py-4 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 transition-colors group">
                            TYPE <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                        <th onclick="sortTable('current_price')" class="w-[15%] py-4 text-left text-[14px] font-black text-white uppercase tracking-[0.2em] cursor-pointer hover:text-blue-400 transition-colors group">
                            AUDIT <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <div class="px-6 md:px-12 pb-24">
        <table class="min-w-full border-collapse">
            <tbody id="tableBody" class="divide-y-2 divide-slate-100"></tbody>
        </table>
    </div>

    <script>
        let apiData = [];
        let sortDirection = 1;

        async function init() {
            try {
                let response = await fetch('./dataset_400.json', { cache: 'no-cache' });
                if (!response.ok) response = await fetch('./Dataset_400.json', { cache: 'no-cache' });
                apiData = await response.json();
                populateDropdown('domainFilter', 'domain');
                populateDropdown('modelFilter', 'pricing_model');
                populateDropdown('scopeFilter', 'scope');
                renderTable(apiData);
                ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => {
                    document.getElementById(id).addEventListener('input', () => { applyFilters(); toggleResetBtn(); });
                });
                window.addEventListener('scroll', () => {
                    document.getElementById('backToTop').classList.toggle('hidden', window.scrollY <= 400);
                });
            } catch (err) { console.error(err); }
        }

        function toggleResetBtn() {
            const hasVal = document.getElementById('searchInput').value || document.getElementById('domainFilter').value || document.getElementById('modelFilter').value || document.getElementById('scopeFilter').value;
            document.getElementById('resetBtn').classList.toggle('active', !!hasVal);
        }

        function clearFilters() {
            ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => document.getElementById(id).value = '');
            toggleResetBtn(); renderTable(apiData);
        }

        function populateDropdown(id, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
            el.innerHTML = `<option value="">ALL ${key.toUpperCase()}S</option>` + vals.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            document.getElementById('counter').innerText = `${data.length} / ${apiData.length} NODES`;
            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="py-32 text-center text-slate-300 font-bold uppercase tracking-widest text-sm">No Audit Nodes Found</td></tr>';
                return;
            }
            body.innerHTML = data.map(api => `
                <tr class="clickable-row group bg-white" onclick="window.open('${api.pricing_url}', '_blank')">
                    <td class="w-[20%] py-5 pr-4">
                        <span class="text-blue-600 font-black text-[15px] tracking-tight group-hover:text-blue-800 transition-colors">${api.name}</span>
                    </td>
                    <td class="w-[38%] py-5 pr-12 text-[13px] text-slate-500 font-semibold leading-relaxed relative">
                        ${api.description || '...'}
                        <div class="hover-hint">AUDIT SOURCE <i class="fas fa-chevron-right ml-1"></i></div>
                    </td>
                    <td class="w-[15%] py-5 text-[11px] font-black text-slate-400 uppercase tracking-tighter">${api.domain || 'N/A'}</td>
                    <td class="w-[12%] py-5 text-[12px] text-slate-700 font-black tracking-tighter">${api.pricing_model || 'N/A'}</td>
                    <td class="w-[15%] py-5 text-[11px] font-black uppercase tracking-tighter ${api.current_price ? 'text-emerald-600' : 'text-slate-300'}">
                        ${api.current_price || 'AUDITING'}
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const d = document.getElementById('domainFilter').value, m = document.getElementById('modelFilter').value, sc = document.getElementById('scopeFilter').value;
            const filtered = apiData.filter(i => (i.name.toLowerCase().includes(s)) && (d === "" || i.domain === d) && (m === "" || i.pricing_model === m) && (sc === "" || i.scope === sc));
            renderTable(filtered);
        }

        function sortTable(col) {
            sortDirection *= -1;
            const sorted = [...apiData].sort((a, b) => {
                const x = (a[col] || '').toString().toLowerCase();
                const y = (b[col] || '').toString().toLowerCase();
                return x < y ? -sortDirection : (x > y ? sortDirection : 0);
            });
            renderTable(sorted);
        }
        init();
    </script>
</body>
</html>
