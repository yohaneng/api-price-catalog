<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Price Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-4">API Pricing Catalog</h1>
        <p class="mb-8 text-gray-600">A live directory of 400+ APIs and their current pricing structures.</p>
        
        <input type="text" id="searchInput" placeholder="Search APIs by name..." class="w-full p-3 border rounded-lg mb-6 shadow-sm">

        <div class="overflow-x-auto bg-white rounded-lg shadow">
            <table class="min-w-full table-auto" id="apiTable">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Domain</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Pricing Model</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Current Price</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const response = await fetch('dataset_400.json');
            const data = await response.json();
            const tableBody = document.getElementById('tableBody');
            
            function renderTable(items) {
                tableBody.innerHTML = items.map(api => `
                    <tr class="border-t">
                        <td class="px-6 py-4 font-semibold text-blue-600"><a href="${api.pricing_url}" target="_blank">${api.name}</a></td>
                        <td class="px-6 py-4 text-sm text-gray-600">${api.domain}</td>
                        <td class="px-6 py-4 text-sm">${api.pricing_model}</td>
                        <td class="px-6 py-4">
                            <span class="${api.current_price ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-500'} px-2 py-1 rounded text-xs font-bold">
                                ${api.current_price || 'Updating...'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            }

            renderTable(data);

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = data.filter(api => api.name.toLowerCase().includes(term));
                renderTable(filtered);
            });
        }
        loadData();
    </script>
</body>
</html>
