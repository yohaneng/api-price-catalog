<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Price Catalog | Research Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        
        /* THE KEY FIX: The Master Sticky Container */
        .master-sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #f8fafc; /* Matches body background */
        }

        /* Ensuring the table header sticks perfectly at the bottom of the master container */
        .table-header-row {
            position: sticky;
            top: 100%; /* Docks it to the bottom of its parent */
            background: #0f172a; /* Slate-900 */
        }

        #backToTop.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <button id="backToTop" onclick="window.scrollTo(0,0)" class="hidden fixed bottom-8 right-8 bg-blue-600 text-white w-12 h-12 rounded-full shadow-2xl flex items-center justify-center hover:bg-blue-700 z-[200] transition-all">
        <i class="fas fa-arrow-up"></i>
    </button>

    <div class="master-sticky-header shadow-md">
        <div class="px-4 md:px-8 pt-6 pb-4">
            <header class="mb-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-black tracking-tight text-slate-900 uppercase">API WORLD</h1>
                    <p class="text-slate-500 text-sm font-medium uppercase tracking-tighter">A list of APIs of the World with Realtime links and Pricing</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="clearFilters()" class="bg-white hover:bg-red-50 text-red-600 px-3 py-2 rounded-lg border border-red-100 text-xs font-bold transition-all">
                        <i class="fas fa-undo mr-1"></i> RESET
                    </button>
                    <div id="counter" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-black text-xs min-w-[120px] text-center shadow-inner">
                        LOADING...
                    </div>
                </div>
            </header>

            <div class="bg-white p-3 rounded-xl border border-slate-200 grid grid-cols-1 md:grid-cols-4 gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Search API Name..." class="w-full p-2 pl-9 border border-slate-100 rounded-lg bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-300"></i>
                </div>
                <select id="domainFilter" class="w-full p-2 border border-slate-100 rounded-lg bg-slate-50 outline-none text-sm font-medium focus:ring-2 focus:ring-blue-500"></select>
                <select id="modelFilter" class="w-full p-2 border border-slate-100 rounded-lg bg-slate-50 outline-none text-sm font-medium focus:ring-2 focus:ring-blue-500"></select>
                <select id="scopeFilter" class="w-full p-2 border border-slate-100 rounded-lg bg-slate-50 outline-none text-sm font-medium focus:ring-2 focus:ring-blue-500"></select>
            </div>
        </div>

        <table class="min-w-full">
            <thead class="bg-slate-900 text-white">
                <tr>
                    <th onclick="sortTable('name')" class="w-[20%] px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800 transition-colors">API Name <i class="fas fa-sort ml-1 opacity-30"></i></th>
                    <th class="w-[35%] px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest">Description</th>
                    <th onclick="sortTable('domain')" class="w-[15%] px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800 transition-colors">Domain <i class="fas fa-sort ml-1 opacity-30"></i></th>
                    <th onclick="sortTable('pricing_model')" class="w-[15%] px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800 transition-colors">Model <i class="fas fa-sort ml-1 opacity-30"></i></th>
                    <th onclick="sortTable('current_price')" class="w-[15%] px-6 py-4 text-left text-[10px] font-black uppercase tracking-widest cursor-pointer hover:bg-slate-800 transition-colors">Price Audit <i class="fas fa-sort ml-1 opacity-30"></i></th>
                </tr>
            </thead>
        </table>
    </div>

    <div class="max-w-full mx-auto">
        <table class="min-w-full border-collapse">
            <tbody id="tableBody" class="divide-y divide-slate-200 bg-white">
                </tbody>
        </table>
    </div>

    <script>
        let apiData = [];
        let sortDirection = 1;

        async function init() {
            try {
                let response = await fetch('./dataset_400.json', { cache: 'no-cache' });
                if (!response.ok) response = await fetch('./Dataset_400.json', { cache: 'no-cache' });
                apiData = await response.json();
                
                populateDropdown('domainFilter', 'domain');
                populateDropdown('modelFilter', 'pricing_model');
                populateDropdown('scopeFilter', 'scope');
                renderTable(apiData);
                
                ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => {
                    document.getElementById(id).addEventListener('input', applyFilters);
                });

                window.addEventListener('scroll', () => {
                    document.getElementById('backToTop').classList.toggle('hidden', window.scrollY <= 500);
                });
            } catch (err) { console.error(err); }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('domainFilter').value = '';
            document.getElementById('modelFilter').value = '';
            document.getElementById('scopeFilter').value = '';
            renderTable(apiData);
        }

        function populateDropdown(id, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
            el.innerHTML = `<option value="">All ${key}s</option>` + vals.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            document.getElementById('counter').innerText = `${data.length} / ${apiData.length} ITEMS`;

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-slate-400 font-bold uppercase tracking-widest">No matching results</td></tr>';
                return;
            }

            body.innerHTML = data.map(api => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="w-[20%] px-6 py-5 whitespace-nowrap">
                        <a href="${api.pricing_url}" target="_blank" class="text-blue-600 font-bold hover:underline tracking-tight">${api.name}</a>
                    </td>
                    <td class="w-[35%] px-6 py-5 text-sm text-slate-500 leading-relaxed">${api.description || '...'}</td>
                    <td class="w-[15%] px-6 py-5 text-xs font-semibold text-slate-500 uppercase tracking-tighter">${api.domain || 'N/A'}</td>
                    <td class="w-[15%] px-6 py-5 text-sm text-slate-600 font-medium">${api.pricing_model || 'N/A'}</td>
                    <td class="w-[15%] px-6 py-5">
                        <span class="${api.current_price ? 'text-green-600 bg-green-50' : 'text-slate-400 bg-slate-50'} px-2 py-1 rounded-md text-[9px] font-black uppercase border border-current">
                            ${api.current_price || 'AUDITING'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const d = document.getElementById('domainFilter').value;
            const m = document.getElementById('modelFilter').value;
            const sc = document.getElementById('scopeFilter').value;

            const filtered = apiData.filter(i => 
                (i.name.toLowerCase().includes(s)) &&
                (d === "" || i.domain === d) &&
                (m === "" || i.pricing_model === m) &&
                (sc === "" || i.scope === sc)
            );
            renderTable(filtered);
        }

        function sortTable(col) {
            sortDirection *= -1;
            const sorted = [...apiData].sort((a, b) => {
                const x = (a[col] || '').toString().toLowerCase();
                const y = (b[col] || '').toString().toLowerCase();
                return x < y ? -sortDirection : (x > y ? sortDirection : 0);
            });
            renderTable(sorted);
        }

        init();
    </script>
</body>
</html>
