<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API WORLD | Global Pricing Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #fcfdfe; }
        html { scroll-behavior: smooth; }
        
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 250, 252, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e2e8f0;
        }

        /* INFOGRAPHIC: Pricing Spectrum Bar */
        .spectrum-container {
            display: flex;
            height: 6px;
            width: 140px;
            border-radius: 10px;
            overflow: hidden;
            background: #e2e8f0;
            margin-top: 4px;
        }
        .spec-free { background: #10b981; width: 45%; }
        .spec-freemium { background: #3b82f6; width: 40%; }
        .spec-paid { background: #f59e0b; width: 15%; }

        .pulse-icon {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        #resetBtn {
            transition: all 0.3s ease;
            opacity: 0.3;
            filter: grayscale(1);
            pointer-events: none;
        }

        #resetBtn.active {
            opacity: 1;
            filter: grayscale(0);
            pointer-events: auto;
            background: #ef4444;
            color: white;
        }

        .clickable-row:hover {
            background-color: #f8fafc !important;
            box-shadow: inset 4px 0 0 0 #3b82f6;
        }

        .hover-hint {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: #3b82f6;
            font-size: 10px;
            font-weight: 800;
            opacity: 0;
            transition: 0.2s;
        }

        .clickable-row:hover .hover-hint { opacity: 1; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <button id="backToTop" onclick="window.scrollTo(0,0)" class="hidden fixed bottom-10 right-10 bg-slate-900 text-white w-12 h-12 rounded-2xl shadow-2xl flex items-center justify-center hover:bg-blue-600 z-[200] transition-all">
        <i class="fas fa-chevron-up"></i>
    </button>

    <div class="glass-header">
        <div class="px-6 md:px-12 py-4"> <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                <div class="flex items-center gap-6">
                    <div>
                        <div class="flex items-center">
                            <span class="pulse-icon"></span>
                            <h1 class="text-3xl font-[900] tracking-tighter text-slate-900 uppercase">API<span class="text-blue-600">WORLD</span></h1>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-1">Global Audit Feed</p>
                    </div>

                    <div class="hidden lg:block border-l border-slate-200 pl-6">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Pricing Spectrum</p>
                        <div class="spectrum-container">
                            <div class="spec-free" title="Free"></div>
                            <div class="spec-freemium" title="Freemium"></div>
                            <div class="spec-paid" title="Paid"></div>
                        </div>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[8px] font-bold text-slate-400"><i class="fas fa-circle text-emerald-500 mr-0.5"></i> Free</span>
                            <span class="text-[8px] font-bold text-slate-400"><i class="fas fa-circle text-blue-500 mr-0.5"></i> Freemium</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="hidden xl:flex items-center gap-4 mr-4 border-r border-slate-200 pr-6">
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Uptime</p>
                            <p class="text-[11px] font-bold text-emerald-600">99.8%</p>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Protocols</p>
                            <p class="text-[11px] font-bold text-slate-700">REST/GQL</p>
                        </div>
                    </div>
                    
                    <button id="resetBtn" onclick="clearFilters()" class="flex items-center gap-2 bg-white text-slate-400 px-4 py-2 rounded-xl border border-slate-200 text-[10px] font-bold transition-all">
                        <i class="fas fa-filter-circle-xmark"></i> RESET
                    </button>
                    <div id="counter" class="bg-slate-900 text-white px-5 py-2 rounded-xl font-black text-[11px] min-w-[120px] text-center shadow-lg">
                        ---
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-2.5"> <div class="relative group">
                    <input type="text" id="searchInput" placeholder="Search Identity..." class="w-full p-2.5 pl-9 border border-slate-200 rounded-lg bg-white focus:ring-4 focus:ring-blue-500/10 outline-none text-xs font-medium transition-all">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-300 group-focus-within:text-blue-500"></i>
                </div>
                <select id="domainFilter" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white outline-none text-xs font-bold text-slate-600 focus:ring-4 focus:ring-blue-500/10 cursor-pointer"></select>
                <select id="modelFilter" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white outline-none text-xs font-bold text-slate-600 focus:ring-4 focus:ring-blue-500/10 cursor-pointer"></select>
                <select id="scopeFilter" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white outline-none text-xs font-bold text-slate-600 focus:ring-4 focus:ring-blue-500/10 cursor-pointer"></select>
            </div>
        </div>

        <div class="bg-slate-900 px-6 md:px-12">
            <table class="min-w-full">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" class="w-[20%] py-3 text-left text-[12px] font-black text-white uppercase tracking-widest cursor-pointer hover:text-blue-400 transition-colors group">
                            API IDENTITY <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                        <th class="w-[38%] py-3 text-left text-[12px] font-black text-white uppercase tracking-widest">
                            DESCRIPTION
                        </th>
                        <th onclick="sortTable('domain')" class="w-[15%] py-3 text-left text-[12px] font-black text-white uppercase tracking-widest cursor-pointer hover:text-blue-400 transition-colors group">
                            DOMAIN <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                        <th onclick="sortTable('pricing_model')" class="w-[12%] py-3 text-left text-[12px] font-black text-white uppercase tracking-widest cursor-pointer hover:text-blue-400 transition-colors group">
                            TYPE <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                        <th onclick="sortTable('current_price')" class="w-[15%] py-3 text-left text-[12px] font-black text-white uppercase tracking-widest cursor-pointer hover:text-blue-400 transition-colors group">
                            AUDIT <i class="fas fa-sort ml-1 opacity-20 group-hover:opacity-100"></i>
                        </th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>

    <div class="px-6 md:px-12 pb-24">
        <table class="min-w-full border-collapse">
            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
        </table>
    </div>

    <script>
        let apiData = [];
        let sortDirection = 1;

        async function init() {
            try {
                let response = await fetch('./dataset_400.json', { cache: 'no-cache' });
                if (!response.ok) response = await fetch('./Dataset_400.json', { cache: 'no-cache' });
                apiData = await response.json();
                populateDropdown('domainFilter', 'domain');
                populateDropdown('modelFilter', 'pricing_model');
                populateDropdown('scopeFilter', 'scope');
                renderTable(apiData);
                ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => {
                    document.getElementById(id).addEventListener('input', () => { applyFilters(); toggleResetBtn(); });
                });
                window.addEventListener('scroll', () => {
                    document.getElementById('backToTop').classList.toggle('hidden', window.scrollY <= 400);
                });
            } catch (err) { console.error(err); }
        }

        function toggleResetBtn() {
            const hasVal = document.getElementById('searchInput').value || document.getElementById('domainFilter').value || document.getElementById('modelFilter').value || document.getElementById('scopeFilter').value;
            document.getElementById('resetBtn').classList.toggle('active', !!hasVal);
        }

        function clearFilters() {
            ['searchInput', 'domainFilter', 'modelFilter', 'scopeFilter'].forEach(id => document.getElementById(id).value = '');
            toggleResetBtn(); renderTable(apiData);
        }

        function populateDropdown(id, key) {
            const el = document.getElementById(id);
            const vals = [...new Set(apiData.map(i => i[key]))].filter(Boolean).sort();
            el.innerHTML = `<option value="">ALL ${key.toUpperCase()}S</option>` + vals.map(v => `<option value="${v}">${v.toUpperCase()}</option>`).join('');
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            document.getElementById('counter').innerText = `${data.length} / ${apiData.length} NODES`;
            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" class="py-32 text-center text-slate-300 font-bold uppercase tracking-widest text-xs">No Nodes Found</td></tr>';
                return;
            }
            body.innerHTML = data.map(api => `
                <tr class="clickable-row group" onclick="window.open('${api.pricing_url}', '_blank')">
                    <td class="w-[20%] py-4 pr-4">
                        <span class="text-blue-600 font-[700] text-[13px] tracking-tight group-hover:text-blue-800 transition-colors">${api.name}</span>
                    </td>
                    <td class="w-[38%] py-4 pr-10 text-[11px] text-slate-500 font-medium leading-relaxed relative">
                        ${api.description || '...'}
                        <div class="hover-hint">SOURCE <i class="fas fa-arrow-right ml-1"></i></div>
                    </td>
                    <td class="w-[15%] py-4 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${api.domain || 'N/A'}</td>
                    <td class="w-[12%] py-4 text-[11px] text-slate-600 font-semibold tracking-tighter">${api.pricing_model || 'N/A'}</td>
                    <td class="w-[15%] py-4 text-[10px] font-black uppercase tracking-tighter ${api.current_price ? 'text-emerald-600' : 'text-slate-300'}">
                        ${api.current_price || 'AUDITING'}
                    </td>
                </tr>
            `).join('');
        }

        function applyFilters() {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const d = document.getElementById('domainFilter').value, m = document.getElementById('modelFilter').value, sc = document.getElementById('scopeFilter').value;
            const filtered = apiData.filter(i => (i.name.toLowerCase().includes(s)) && (d === "" || i.domain === d) && (m === "" || i.pricing_model === m) && (sc === "" || i.scope === sc));
            renderTable(filtered);
        }

        function sortTable(col) {
            sortDirection *= -1;
            const sorted = [...apiData].sort((a, b) => {
                const x = (a[col] || '').toString().toLowerCase();
                const y = (b[col] || '').toString().toLowerCase();
                return x < y ? -sortDirection : (x > y ? sortDirection : 0);
            });
            renderTable(sorted);
        }
        init();
    </script>
</body>
</html>
